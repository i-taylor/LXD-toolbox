<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LXD Sidebar — Preview</title>
  <link rel="stylesheet" href="https://academic-innovation.github.io/canvas-css/dist/canvas-style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f3f3f3;
      min-height: 100vh;
    }

    /* ── Fake Canvas chrome ── */
    #fake-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      background: #00274C;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      z-index: 100;
      flex-shrink: 0;
    }
    #fake-topbar span {
      color: rgba(255,255,255,.5);
      font-size: .85rem;
    }
    #fake-topbar strong { color: white; font-size: .9rem; }

    #fake-toolbar {
      position: fixed;
      top: 48px; left: 0; right: 0;
      height: 40px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      z-index: 99;
    }
    .fake-btn {
      padding: 4px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
      font-size: .78rem;
      cursor: default;
      color: #333;
    }
    .fake-btn.primary {
      background: #00274C;
      color: white;
      border-color: #00274C;
    }

    /* ── Main content area ── */
    #main {
      margin-top: 88px;
      padding: 24px 32px;
      transition: margin-right .2s;
    }

    #page-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1c1c1e;
      margin: 0 0 16px;
    }

    /* ── Mock TinyMCE editor area ── */
    #editor-wrap {
      background: white;
      border: 1px solid #ddd;
      border-radius: 6px;
      overflow: hidden;
    }
    #editor-fake-toolbar {
      background: #f7f7f7;
      border-bottom: 1px solid #ddd;
      padding: 6px 10px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .editor-btn {
      padding: 3px 8px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-size: .75rem;
      cursor: default;
      color: #555;
    }
    #mock-editor {
      min-height: 480px;
      padding: 24px;
      outline: none;
      font-size: 1rem;
      line-height: 1.6;
    }
    #mock-editor .new-canvas { max-width: 100%; }

    /* ── Preview label ── */
    #preview-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #FFCB05;
      color: #1c1c1e;
      font-size: .7rem;
      font-weight: 800;
      letter-spacing: .5px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <!-- Fake Canvas top bar -->
  <div id="fake-topbar">
    <strong>Canvas LMS</strong>
    <span>›</span>
    <span>Course Name</span>
    <span>›</span>
    <span>Pages</span>
    <span>›</span>
    <span>Edit Page</span>
  </div>

  <!-- Fake editor toolbar -->
  <div id="fake-toolbar">
    <button class="fake-btn primary">Save</button>
    <button class="fake-btn">Cancel</button>
    <span style="flex:1"></span>
    <span style="font-size:.75rem;color:#aaa">Mock Canvas editor — sidebar preview harness</span>
  </div>

  <!-- Page content -->
  <div id="main">
    <div id="preview-label">⚡ Preview Mode</div>
    <div id="page-title">Untitled Page</div>

    <div id="editor-wrap">
      <!-- Fake TinyMCE toolbar -->
      <div id="editor-fake-toolbar">
        <button class="editor-btn">B</button>
        <button class="editor-btn"><i>I</i></button>
        <button class="editor-btn">H2</button>
        <button class="editor-btn">H3</button>
        <button class="editor-btn">¶</button>
        <button class="editor-btn">🔗</button>
        <button class="editor-btn">• List</button>
        <button class="editor-btn">1. List</button>
        <span style="margin-left:auto;font-size:.7rem;color:#aaa;align-self:center">Click inside to place cursor</span>
      </div>

      <!-- Editable content area — this is the "editor body" -->
      <div id="mock-editor" contenteditable="true">
        <div class="new-canvas">
          <section class="text-block">
            <h2>Sample Heading</h2>
            <p>This is a sample paragraph. Click anywhere in the editor to place your cursor, then use the sidebar to insert components.</p>
          </section>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Mock TinyMCE API ── -->
  <script>
    // Minimal TinyMCE shim so sidebar.getEditor() returns a working object
    (function () {
      const editorBody = document.getElementById('mock-editor');

      const ed = {
        getBody: () => editorBody,
        getDoc: () => document,

        insertContent(html) {
          // Insert at cursor inside the contenteditable
          const sel = window.getSelection();
          if (sel && sel.rangeCount) {
            const range = sel.getRangeAt(0);
            range.deleteContents();
            const tmp = document.createElement('div');
            tmp.innerHTML = html;
            const frag = document.createDocumentFragment();
            let last;
            while (tmp.firstChild) { last = tmp.firstChild; frag.appendChild(last); }
            range.insertNode(frag);
            if (last) {
              const r = document.createRange();
              r.setStartAfter(last);
              r.collapse(true);
              sel.removeAllRanges();
              sel.addRange(r);
            }
          } else {
            editorBody.insertAdjacentHTML('beforeend', html);
          }
        },

        selection: {
          getNode() {
            const sel = window.getSelection();
            if (sel && sel.rangeCount) {
              let node = sel.getRangeAt(0).startContainer;
              return node.nodeType === 3 ? node.parentElement : node;
            }
            return editorBody;
          },
          setRng(range) {
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
          },
          select(node, bool) {},
          collapse(bool) {},
        },

        dom: {
          createRng: () => document.createRange(),
        },

        undoManager: {
          transact(fn) { fn(); },
        },

        focus() { editorBody.focus(); },
        on(event, fn) {},
        off(event, fn) {},
      };

      window.tinymce = {
        activeEditor: ed,
        editors: [ed],
      };
    })();
  </script>

  <!-- ── Auto-inject the sidebar ── -->
  <script src="./sidebar.js"></script>

</body>
</html>
